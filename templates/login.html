<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网络安全资产扫描系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #252b48 50%, #1a5276 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .login-header {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header h2 {
            font-size: 24px;
            margin: 10px 0 5px;
            font-weight: 600;
        }
        .login-header .subtitle {
            font-size: 13px;
            opacity: 0.8;
        }
        .login-header .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .login-body {
            padding: 30px;
        }
        .form-floating {
            margin-bottom: 16px;
        }
        .form-floating .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            height: 50px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-floating .form-control:focus {
            border-color: #2980b9;
            box-shadow: 0 0 0 0.2rem rgba(41, 128, 185, 0.15);
        }
        .captcha-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .captcha-row .form-control {
            flex: 1;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            height: 50px;
            font-size: 14px;
        }
        .captcha-row .form-control:focus {
            border-color: #2980b9;
            box-shadow: 0 0 0 0.2rem rgba(41, 128, 185, 0.15);
        }
        .captcha-img {
            height: 50px;
            width: 120px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: transform 0.2s;
            object-fit: cover;
        }
        .captcha-img:hover {
            transform: scale(1.02);
            border-color: #2980b9;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #1a5276, #2980b9);
            border: none;
            color: white;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #154360, #1a5276);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(26, 82, 118, 0.4);
            color: white;
        }
        .error-msg {
            background: #fff5f5;
            color: #c0392b;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            border-left: 4px solid #c0392b;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .login-footer {
            text-align: center;
            padding: 0 30px 20px;
            font-size: 12px;
            color: #95a5a6;
        }
        .default-hint {
            background: #e8f4fd;
            color: #2980b9;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="icon"><i class="bi bi-shield-lock"></i></div>
                <h2>网络安全资产扫描系统</h2>
                <div class="subtitle">请登录以继续访问</div>
            </div>
            <div class="login-body">
                <div class="error-msg" id="errorMsg"></div>
                
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" name="username" 
                               placeholder="用户名" required autocomplete="username">
                        <label for="username"><i class="bi bi-person me-2"></i>用户名</label>
                    </div>
                    
                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="密码" required autocomplete="current-password">
                        <label for="password"><i class="bi bi-lock me-2"></i>密码</label>
                    </div>
                    
                    <div class="captcha-row">
                        <input type="text" class="form-control" id="captcha" name="captcha" 
                               placeholder="验证码" required maxlength="4" autocomplete="off">
                        <img id="captchaImg" class="captcha-img" src="/api/captcha" 
                             alt="验证码" title="点击刷新验证码" onclick="refreshCaptcha()">
                    </div>
                    
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>登 录
                    </button>
                </form>
            </div>
            <div class="login-footer">
                网络安全资产扫描平台 &copy; 2026
            </div>
        </div>
    </div>

    <script>
        // 验证码ID
        let captchaId = '';
        
        // 获取验证码
        function refreshCaptcha() {
            fetch('/api/captcha')
                .then(r => r.json())
                .then(data => {
                    captchaId = data.captcha_id;
                    document.getElementById('captchaImg').src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(data.image)));
                });
        }
        
        // 页面加载时获取验证码
        document.addEventListener('DOMContentLoaded', refreshCaptcha);
        
        // 处理登录
        function handleLogin(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat spin me-2"></i>登录中...';
            errorMsg.classList.remove('show');
            
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Captcha-Id': captchaId
                },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    captcha: document.getElementById('captcha').value
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.redirect || '/';
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.add('show');
                    refreshCaptcha();
                    document.getElementById('captcha').value = '';
                }
            })
            .catch(err => {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.classList.add('show');
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>登 录';
            });
            
            return false;
        }
        
        // 回车键提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
